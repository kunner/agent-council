name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared
        run: pnpm --filter @agent-council/shared build

      - name: Typecheck
        run: pnpm typecheck

      - name: Build server
        run: pnpm --filter @agent-council/server build

      - name: Build web
        run: pnpm --filter @agent-council/web build
